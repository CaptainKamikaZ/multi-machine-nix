conky.config = {
    alignment = 'top_right',
    background = true,
    double_buffer = true,

    cpu_avg_samples = 2,
    net_avg_samples = 2,
    update_interval = 1,

    default_color = 'gray',
    color1 = '#1793d1',

    -- Body text font (clean + aligned)
    font = 'DejaVu Sans Mono:size=9',

    gap_x = 30,
    gap_y = 60,

    minimum_width = 220,
    minimum_height = 250,

    -- Wayland‑safe window settings
    own_window = true,
    own_window_type = 'desktop',
    own_window_transparent = false,
    own_window_argb_visual = true,
    own_window_argb_value = 0,
    own_window_colour = '000000',
    own_window_hints = 'undecorated,sticky,skip_taskbar,skip_pager,below',

    draw_borders = false,
    draw_graph_borders = true,
    draw_outline = false,
    draw_shades = false,
};

conky.text = [[
${font Neon 80s:size=12}${color1}SYSTEM $hr${color}${font}
Hostname: ${color}$nodename
Kernel: ${color}$kernel
Uptime: ${color}$uptime_short

${font Neon 80s:size=12}${color1}CPU $hr${color}${font}
Freq: ${color}${freq_g}GHz
Usage: ${color}${cpu}% ${alignr}${cpubar 4,100}
Temp: ${color}${exec sensors k10temp-pci-00c3 | grep 'Tctl' | awk '{print $2}'}

${font Neon 80s:size=12}${color1}NVMe $hr${color}${font}
Temp: ${color}${exec sensors nvme-pci-0100 | grep 'Composite' | awk '{print $2}'}

${font Neon 80s:size=12}${color1}MEMORY $hr${color}${font}
RAM: ${color}$mem / $memmax ${alignr}$memperc%
${membar 4,100}
SWAP: ${color}$swap / $swapmax ${alignr}$swapperc%
${swapbar 4,100}

${font Neon 80s:size=12}${color1}TOP PROCESSES $hr${color}${font}
${top name 1} ${alignr}${top cpu 1}%
${top name 2} ${alignr}${top cpu 2}%
${top name 3} ${alignr}${top cpu 3}%
${top name 4} ${alignr}${top cpu 4}%
${top name 5} ${alignr}${top cpu 5}%

${font Neon 80s:size=12}${color1}STORAGE $hr${color}${font}
Root: ${color}${fs_used /} / ${fs_size /} ${alignr}${fs_used_perc /}%
${fs_bar 4,100 /}

${font Neon 80s:size=12}${color1}NETWORK (Ethernet) $hr${color}${font}
Interface: ${color}enp34s0
Down: ${color}${downspeed enp34s0} ${alignr}${totaldown enp34s0}
Up:   ${color}${upspeed enp34s0} ${alignr}${totalup enp34s0}
]];
